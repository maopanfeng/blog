<!doctype html>
<html lang="{{ .Lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Title }} - Ben Thinking</title>
    <style>
        /* 基础样式 - 保持 Ben Thinking 极简风格 */
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        
        main { width: 100%; max-width: 720px; margin: 120px auto 0; padding: 0 24px; position: relative; box-sizing: border-box; width: 100%; }
        
        /* 星图容器：自适应高度 */
        #wiki-graph { width: 100%; height: 500px; background: #fafafa; border-radius: 12px; margin-bottom: 50px; border: 1px solid #f0f0f0; cursor: grab; overflow: hidden; }
        
        /* 列表样式 */
        .post-list h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.3; }
        .post-item { margin-bottom: 35px; display: block; text-decoration: none; color: inherit; border-bottom: 1px solid #f9f9f9; padding-bottom: 20px; }
        .post-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; display: block; }
        .post-date { opacity: 0.25; font-size: 0.8rem; font-family: monospace; }
        
        /* 语言切换按钮样式 */
        .lang-switch { font-size: 12px; opacity: 0.4; text-decoration: none; color: inherit; font-weight: 700; }
        .lang-switch:hover { opacity: 1; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ if eq .Lang "cn" }}/cn/{{ else }}/{{ end }}" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                {{ if eq .Lang "en" }}
                    <a href="/cn/wiki" class="lang-switch">中文</a>
                {{ else }}
                    <a href="/wiki" class="lang-switch">EN</a>
                {{ end }}
            </div>
        </div>
    </header>

    <main>
        <div id="wiki-graph"></div>

        <div class="post-list">
            <h2>{{ if eq .Lang "cn" }}知识节点{{ else }}Knowledge Nodes{{ end }}</h2>
            {{ range (where .Site.RegularPages "Section" "posts") }}
                {{ if eq .Lang $.Lang }}
                <article class="post-item">
                    <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                    <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                </article>
                {{ end }}
            {{ end }}
        </div>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // 1. 自动化数据抓取：将 Hugo 文章自动转化为 JS 对象
        const allNodes = [
            {{ range (where .Site.RegularPages "Section" "posts") }}
                {{ if eq .Lang $.Lang }}
                { id: "{{ .Title }}", url: "{{ .Permalink }}" },
                {{ end }}
            {{ end }}
        ];

        // 2. 逻辑连线：定义核心关联逻辑
        const allLinks = [];
        allNodes.forEach(sourceNode => {
            allNodes.forEach(targetNode => {
                // 自动交叉连线规则：例如 Lingotto 自动连接 James Anderson
                if (sourceNode.id.includes("Lingotto") && (targetNode.id.includes("James") || targetNode.id.includes("詹姆斯"))) {
                    allLinks.push({ source: sourceNode.id, target: targetNode.id });
                }
                // 规模法则与复杂性自动连线
                if (sourceNode.id.includes("Scale") || sourceNode.id.includes("规模")) {
                    if (targetNode.id.includes("Complexity") || targetNode.id.includes("复杂")) {
                        allLinks.push({ source: sourceNode.id, target: targetNode.id });
                    }
                }
            });
        });

        // 3. D3 渲染引擎逻辑
        const container = document.getElementById('wiki-graph');
        const width = container.clientWidth;
        const height = 500;

        const svg = d3.select("#wiki-graph").append("svg")
            .attr("width", width)
            .attr("height", height);

        // 这里的力导向参数经过微调，确保节点不重叠
        const sim = d3.forceSimulation(allNodes)
            .force("link", d3.forceLink(allLinks).id(d => d.id).distance(120))
            .force("charge", d3.forceManyBody().strength(-600))
            .force("center", d3.forceCenter(width / 2, height / 2));

        const link = svg.append("g")
            .attr("stroke", "#eee")
            .attr("stroke-width", 1.5)
            .selectAll("line")
            .data(allLinks)
            .join("line");

        const node = svg.append("g")
            .selectAll("g")
            .data(allNodes)
            .join("g")
            .style("cursor", "pointer")
            .on("click", (e, d) => { window.location.href = d.url; })
            .call(d3.drag()
                .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

        node.append("circle")
            .attr("r", 8)
            .attr("fill", "#000")
            .attr("stroke", "#fff")
            .attr("stroke-width", 2);

        node.append("text")
            .text(d => d.id)
            .attr("x", 14)
            .attr("y", 5)
            .style("font-size", "12px")
            .style("fill", "#666")
            .style("font-weight", "500");

        sim.on("tick", () => {
            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    </script>
</body>
</html>
