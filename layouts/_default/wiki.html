<!doctype html>
<html lang="{{ .Lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Title }} - Ben Thinking</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; }
        
        main { width: 100%; max-width: 720px; margin: 120px auto 0; padding: 0 24px; position: relative; box-sizing: border-box; }
        
        /* 增加溢出隐藏，防止干扰页面滚动 */
        #wiki-graph { width: 100%; height: 500px; background: #fafafa; border-radius: 12px; margin-bottom: 50px; border: 1px solid #f0f0f0; cursor: grab; overflow: hidden; position: relative; }
        
        .post-list h2 { font-size: 1.1rem; font-weight: 800; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.3; }
        .post-item { margin-bottom: 35px; display: block; text-decoration: none; color: inherit; border-bottom: 1px solid #f9f9f9; padding-bottom: 20px; }
        .post-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; display: block; }
        .post-date { opacity: 0.25; font-size: 0.8rem; font-family: monospace; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ if eq .Lang "cn" }}/cn/{{ else }}/{{ end }}" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                {{ if eq .Lang "en" }}
                    <a href="/cn/wiki" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit; font-weight:700;">中文</a>
                {{ else }}
                    <a href="/wiki" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit; font-weight:700;">EN</a>
                {{ end }}
            </div>
        </div>
    </header>

    <main>
        <div id="wiki-graph"></div>

        <div class="post-list">
            <h2>{{ if eq .Lang "cn" }}知识节点{{ else }}Knowledge Nodes{{ end }}</h2>
            {{ range (where .Site.RegularPages "Section" "posts") }}
                {{ if eq .Lang $.Lang }}
                <article class="post-item">
                    <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                    <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                </article>
                {{ end }}
            {{ end }}
        </div>
    </main>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        const allNodes = [
            {{ range (where .Site.RegularPages "Section" "posts") }}
                {{ if eq .Lang $.Lang }}
                { id: "{{ .Title }}", url: "{{ .Permalink }}" },
                {{ end }}
            {{ end }}
        ];

        const allLinks = [];
        allNodes.forEach(s => {
            allNodes.forEach(t => {
                if (s.id !== t.id) {
                    // 逻辑连线：James Anderson <-> Lingotto, Scale <-> Complexity
                    if ((s.id.includes("James") || s.id.includes("詹姆斯")) && t.id.includes("Lingotto")) allLinks.push({source: s.id, target: t.id});
                    if ((s.id.includes("Scale") || s.id.includes("规模")) && (t.id.includes("Complexity") || t.id.includes("复杂"))) allLinks.push({source: s.id, target: t.id});
                }
            });
        });

        const container = document.getElementById('wiki-graph');
        const width = container.clientWidth;
        const height = 500;

        const svg = d3.select("#wiki-graph").append("svg")
            .attr("viewBox", [0, 0, width, height]) // 使用 viewBox 保持比例
            .attr("width", width)
            .attr("height", height);

        const sim = d3.forceSimulation(allNodes)
            .force("link", d3.forceLink(allLinks).id(d => d.id).distance(100))
            .force("charge", d3.forceManyBody().strength(-400)) // 稍微减弱排斥力
            .force("center", d3.forceCenter(width / 2, height / 2))
            .force("collision", d3.forceCollide().radius(50)); // 防止节点重叠

        const link = svg.append("g")
            .attr("stroke", "#eee")
            .attr("stroke-width", 1.5)
            .selectAll("line").data(allLinks).join("line");

        const node = svg.append("g")
            .selectAll("g").data(allNodes).join("g")
            .style("cursor", "pointer")
            .on("click", (e, d) => { window.location.href = d.url; })
            .call(d3.drag()
                .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
                .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
                .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

        node.append("circle").attr("r", 8).attr("fill", "#000").attr("stroke", "#fff").attr("stroke-width", 2);
        node.append("text").text(d => d.id).attr("x", 14).attr("y", 5).style("font-size", "12px").style("fill", "#666");

        sim.on("tick", () => {
            // 关键修复：加入边界限制，不让节点坐标超出画布范围
            allNodes.forEach(d => {
                d.x = Math.max(80, Math.min(width - 80, d.x));
                d.y = Math.max(30, Math.min(height - 30, d.y));
            });

            link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            node.attr("transform", d => `translate(${d.x},${d.y})`);
        });
    </script>
</body>
</html>
