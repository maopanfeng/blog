<!doctype html>
<html lang="{{ .Lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Title }} - Ben Thinking</title>
    <script src="https://unpkg.com/force-graph"></script>
    <style>
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
        .site-title { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em; }
        
        main { width: 100%; max-width: 720px; margin: 140px auto 0; padding: 0 24px; position: relative; box-sizing: border-box; flex: 1; transition: max-width 0.4s ease; }
        @media (min-width: 1200px) { .wiki-mode { max-width: 1200px !important; } .wiki-mode #graph-container { height: 850px !important; } }
        
        h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem; text-align: center; }
        .post-date { opacity: 0.25; font-size: 0.9rem; text-align: center; margin-bottom: 3rem; }
        .content { line-height: 1.8; opacity: 0.9; font-size: 17px; }
        #graph-container { width: 100%; height: 600px; margin: 0; background: #fff; }
        footer { width: 100%; padding: 100px 24px 60px; text-align: center; font-size: 12px; opacity: 0.2; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ .Site.BaseURL | relLangURL }}" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right" style="display:flex; align-items:center; gap:15px;">
                {{ if eq .Lang "en" }}<a href="/cn/" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit; font-weight:700;">中文</a>
                {{ else }}<a href="/" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit; font-weight:700;">EN</a>{{ end }}
                <a href="{{ "wiki" | relLangURL }}" style="font-size:14px; opacity:0.6; text-decoration:none; color:inherit;">Wiki</a>
            </div>
        </div>
    </header>

    <main class="{{ if in .Title "Wiki" }}wiki-mode{{ end }}">
        <h1>{{ .Title }}</h1>
        {{ if not (in .Title "Wiki") }}<div class="post-date">{{ .Date.Format "2006-01-02" }}</div>{{ end }}

        <div class="content">
            {{ if in .Title "Wiki" }}
                <div id="graph-container"></div>
                <script>
                    window.onload = function() {
                        const container = document.getElementById('graph-container');
                        const nodes = [{ id: 'Wiki', name: 'Wiki', group: 1, size: 14 }];
                        const links = [];
                        const nodesSet = new Set(['Wiki']);
                        {{ range .Site.RegularPages }}{{ if .Params.keywords }}
                            if (!nodesSet.has('{{ .Title }}')) {
                                nodes.push({ id: '{{ .Title }}', name: '{{ .Title }}', group: 2, size: 10, url: '{{ .Permalink }}' });
                                links.push({ source: 'Wiki', target: '{{ .Title }}' });
                                nodesSet.add('{{ .Title }}');
                            }
                            {{ range .Params.keywords }}
                                if (!nodesSet.has('{{ . }}')) {
                                    nodes.push({ id: '{{ . }}', name: '{{ . }}', group: 3, size: 6 });
                                    nodesSet.add('{{ . }}');
                                }
                                links.push({ source: '{{ $.Title }}', target: '{{ . }}' });
                            {{ end }}
                        {{ end }}{{ end }}
                        const Graph = ForceGraph()(container)
                            .graphData({ nodes, links })
                            .nodeCanvasObject((node, ctx, globalScale) => {
                                const label = node.name; const radius = node.size / 2;
                                ctx.beginPath(); ctx.arc(node.x, node.y, radius, 0, 2 * Math.PI);
                                ctx.fillStyle = node.group === 1 ? '#007aff' : (node.group === 2 ? '#000' : '#ccc');
                                ctx.fill();
                                ctx.font = `${12/globalScale}px sans-serif`; ctx.textAlign = 'center';
                                ctx.fillStyle = '#333'; ctx.fillText(label, node.x, node.y + radius + 5);
                            })
                            .width(container.offsetWidth).height(container.offsetHeight)
                            .onNodeClick(node => { if(node.url) window.location.href = node.url; });
                    };
                </script>
            {{ else }}
                {{ .Content }}
            {{ end }}
        </div>
    </main>
    <footer><p>© 2026 Ben Thinking. All Rights Reserved.</p></footer>
</body>
</html>
