<!doctype html>

<html lang="{{ .Lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
<title>{{ .Title }} - Ben Thinking</title>
<script src=""></script>
<style>
body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
.nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
.logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
.site-logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
.site-title { font-weight: 800; font-size: 1.25rem; }
main { width: 100%; max-width: 720px; margin: 140px auto 0; padding: 0 24px; box-sizing: border-box; flex: 1; }
h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem; text-align: center; }
.content { line-height: 1.8; opacity: 0.9; font-size: 17px; }
#graph-container { width: 100%; height: 500px; margin-top: 20px; }
footer { width: 100%; padding: 60px 24px; text-align: center; font-size: 12px; opacity: 0.2; }
</style>
</head>
<body>
<header>
<div class="nav-container">
<a href="{{ .Site.BaseURL | relLangURL }}" class="logo-wrapper">
<img src="/logo.png" alt="" class="site-logo">
<span class="site-title">Ben Thinking</span>
</a>
<div class="nav-right">
{{ if eq .Lang "en" }} <a href="/cn/" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit;">中文</a>
{{ else }} <a href="/" style="font-size:12px; opacity:0.4; text-decoration:none; color:inherit;">EN</a> {{ end }}
<a href="{{ "wiki" | relLangURL }}" style="font-size:14px; opacity:0.6; text-decoration:none; color:inherit; margin-left:15px;">Wiki</a>
</div>
</div>
</header>
<main>
<h1>{{ .Title }}</h1>
<div class="content">
{{ if in .Title "Wiki" }}
<div id="graph-container"></div>
<script>
window.onload = function() {
const container = document.getElementById('graph-container');
const nodes = [{ id: 'Wiki', name: 'Wiki', group: 1, size: 12 }];
const links = [];
{{ range .Site.RegularPages }}{{ if .Params.keywords }}
nodes.push({ id: '{{ .Title }}', name: '{{ .Title }}', group: 2, size: 8, url: '{{ .Permalink }}' });
links.push({ source: 'Wiki', target: '{{ .Title }}' });
{{ end }}{{ end }}
ForceGraph()(container).graphData({ nodes, links }).nodeLabel('name').onNodeClick(node => { if(node.url) window.location.href = node.url; });
};
</script>
{{ else }}
{{ .Content }}
{{ end }}
</div>
</main>
<footer><p>© 2026 Ben Thinking. All Rights Reserved.</p></footer>
</body>
</html>
