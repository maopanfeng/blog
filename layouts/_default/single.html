<style>
    /* ... 前面样式保持不变 ... */
    main { width: 100%; max-width: 720px; margin: 140px auto 100px; padding: 0 24px; position: relative; box-sizing: border-box; }
    
    /* iMac 端深度适配：Wiki 模式全面放开 */
    @media (min-width: 1200px) {
        .wiki-mode { max-width: 1200px !important; }
        #graph-container { height: 850px !important; }
    }
    
    #graph-container { width: 100%; height: 700px; margin: 0; cursor: grab; background: #fff; }
    /* ... 后面样式保持不变 ... */
</style>

<script>
    // ... 略过数据处理部分 ...
    const Graph = ForceGraph()(container)
        .graphData({ nodes, links })
        // ... 略过 Canvas 渲染部分 ...
        .width(container.offsetWidth).height(container.offsetHeight); // 自动读取容器高度

    // 针对大屏幕动态调整引力
    const isLargeScreen = window.innerWidth > 1200;
    Graph.d3Force('charge').strength(isLargeScreen ? -600 : -300);
    Graph.d3Force('link').distance(isLargeScreen ? 130 : 70);
</script>
