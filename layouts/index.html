<!doctype html>
<html lang="{{ .Lang }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Site.Title }}</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
        
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; flex-shrink: 0; }
        .site-logo { width: 32px; height: 32px; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; white-space: nowrap; display: block !important; }
        
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-link { font-size: 14px; opacity: 0.6; text-decoration: none; color: inherit; transition: opacity 0.2s; font-weight: 500; }
        .nav-link:hover { opacity: 1; }

        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 12px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 80px; outline: none; transition: width 0.3s; }
        .search-box:focus { width: 120px; }

        /* 时间轴样式：加入“小点”逻辑 */
        .timeline { width: 100%; max-width: 720px; margin-top: 120px; padding: 0 24px; display: flex; flex-wrap: wrap; gap: 12px; box-sizing: border-box; }
        .year-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: all 0.2s; position: relative; }
        
        .year-dot { width: 4px; height: 4px; background: rgba(0,0,0,0); border-radius: 50%; margin-bottom: 4px; transition: background 0.2s; }
        .year-link { font-size: 12px; font-weight: 700; opacity: 0.2; }

        /* 激活状态：年份文字和下方的“点”都显示 */
        .year-wrapper:hover .year-link, .year-wrapper.active .year-link { opacity: 1; color: #000; }
        .year-wrapper.has-posts .year-dot { background: rgba(0,0,0,0.1); } /* 没激活但有文章：淡淡的点 */
        .year-wrapper.active .year-dot { background: #000 !important; } /* 激活：全黑的点 */

        main { width: 100%; max-width: 720px; margin-top: 40px; padding: 0 24px; box-sizing: border-box; flex: 1; }
        .post-list { list-style: none; padding: 0; margin: 0; }
        .post-item { margin-bottom: 28px; text-decoration: none; color: inherit; display: block; transition: transform 0.2s; }
        .post-item:hover { transform: translateX(4px); }
        .post-date { font-size: 11px; opacity: 0.3; font-weight: 700; margin-bottom: 4px; display: block; letter-spacing: 0.05em; }
        .post-title { font-size: 18px; font-weight: 700; line-height: 1.4; }

        footer { width: 100%; padding: 100px 24px 60px; text-align: center; font-size: 11px; opacity: 0.2; letter-spacing: 0.05em; }

        @media (max-width: 600px) {
            .site-title { font-size: 1.1rem; }
            .timeline { gap: 10px; }
            .year-link { font-size: 11px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ if eq .Lang "cn" }}/cn/{{ else }}/{{ end }}" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="search-box" placeholder="Search..." oninput="filterPosts()">
                </div>
                {{ if eq .Lang "en" }}
                    <a href="/cn/" class="nav-link">中文</a>
                    <a href="/wiki" class="nav-link">Wiki</a>
                {{ else }}
                    <a href="/" class="nav-link">EN</a>
                    <a href="/cn/wiki" class="nav-link">Wiki</a>
                {{ end }}
            </div>
        </div>
    </header>

    <div class="timeline" id="timeline">
        </div>

    <main>
        <div class="post-list" id="post-list">
            {{ range .Site.RegularPages.ByDate.Reverse }}
            <a href="{{ .Permalink }}" class="post-item" data-year="{{ .Date.Format "2006" }}" data-title="{{ .Title | lower }}">
                <span class="post-date">{{ .Date.Format "JAN 02, 2006" }}</span>
                <span class="post-title">{{ .Title }}</span>
            </a>
            {{ end }}
        </div>
    </main>

    <footer>
        &copy; {{ now.Year }} Ben Thinking. Complexity is the beginning of wisdom.
    </footer>

    <script>
        const startYear = 2000;
        const endYear = 2026;
        let currentFilterYear = null;

        // 核心修复：Hugo 在渲染时计算出“所有有文章的年份”，传递给 JS
        const yearsWithPosts = [
            {{ range .Site.RegularPages }}
                "{{ .Date.Format "2006" }}",
            {{ end }}
        ];
        // 优化：去重并转为 Set，提高匹配速度
        const postYearsSet = new Set(yearsWithPosts);

        // 1. 生成时间轴（含年份文字和点）
        function initTimeline() {
            const container = document.getElementById('timeline');
            for (let y = endYear; y >= startYear; y--) {
                const yearStr = y.toString();
                
                const wrapper = document.createElement('div');
                wrapper.className = 'year-wrapper';
                if (postYearsSet.has(yearStr)) {
                    wrapper.classList.add('has-posts'); // 这个年份有文章，加上“有文章”标记
                }

                // 生成小点
                const dot = document.createElement('div');
                dot.className = 'year-dot';

                // 生成年份文字
                const span = document.createElement('span');
                span.className = 'year-link';
                span.textContent = y;
                
                // 点击整个 wrapper 都会触发过滤
                wrapper.onclick = () => toggleYear(y, wrapper);
                
                wrapper.appendChild(dot);
                wrapper.appendChild(span);
                container.appendChild(wrapper);
            }
        }

        // 2. 年份切换逻辑
        function toggleYear(year, el) {
            if (currentFilterYear === year) {
                // 如果点击已激活的年份，取消过滤，显示所有
                currentFilterYear = null;
                el.classList.remove('active');
            } else {
                // 激活选定的年份
                document.querySelectorAll('.year-wrapper').forEach(link => link.classList.remove('active'));
                currentFilterYear = year;
                el.classList.add('active');
            }
            filterPosts();
        }

        // 3. 综合过滤（年份 + 搜索）
        function filterPosts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const items = document.querySelectorAll('.post-item');

            items.forEach(item => {
                const yearMatch = !currentFilterYear || item.dataset.year == currentFilterYear;
                const searchMatch = !query || item.dataset.title.includes(query);

                // 年份和搜索都匹配时才显示
                if (yearMatch && searchMatch) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // 初始化
        window.onload = () => {
            initTimeline();
            
            // 处理可能的 URL 搜索参数（如从文章页跳转回来）
            const urlParams = new URLSearchParams(window.location.search);
            const q = urlParams.get('q');
            if (q) {
                document.getElementById('search-input').value = q;
                filterPosts();
            }
        };
    </script>
</body>
</html>
