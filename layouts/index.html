<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        body { margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column; font-family:-apple-system,BlinkMacSystemFont,sans-serif; background-color: #fff; color: #000; -webkit-font-smoothing: antialiased; }
        header { position:fixed; top:0; left:0; right:0; height:100px; z-index:9999; background-color:rgba(255,255,255,0.95); backdrop-filter:blur(10px); }
        .nav-container { max-width:720px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; box-sizing:border-box; }
        .site-title { font-weight:700; font-size:1.25rem; text-decoration:none; color:inherit; letter-spacing:-0.03em; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.04); border-radius: 20px; padding: 6px 15px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 100px; outline: none; }

        .sidebar-archive { position:absolute; left:calc(100% + 60px); top:0; width:100px; }
        .sidebar-archive h3 { font-size:11px; opacity:0.2; text-transform:uppercase; margin-bottom:15px; letter-spacing:2px; }
        .sidebar-archive ul { list-style:none; padding:0; margin:0; font-size:12px; opacity:0.4; line-height:2.5; }
        .sidebar-archive a { color: inherit; text-decoration: none; }
        @media(max-width: 1250px) { .sidebar-archive { display: none; } }

        /* 呼吸感：文章间距 8rem */
        .post-list { margin-top: 160px; }
        .post-item { margin-bottom: 8rem; } 
        .post-title { font-size: 1.85rem; font-weight: 700; margin-bottom: 1.2rem; display: block; text-decoration:none; color:inherit; letter-spacing:-0.02em; }
        .post-date { opacity: 0.25; font-size: 0.9rem; margin-bottom: 2.5rem; }
        
        .summary-content { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; opacity: 0.75; line-height: 1.9; font-size: 16px; }
        details { margin-top: 20px; }
        summary { cursor: pointer; color: #007aff; font-size: 14px; outline: none; list-style: none; padding: 10px 0; font-weight: 500; }
        details[open] .summary-content { display: none; } 
        .full-text { line-height: 2; opacity: 0.9; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="site-title">Ben Thinking</a>
            <nav style="display:flex;gap:25px;align-items:center">
                <div class="search-wrapper"><input type="text" class="search-box" placeholder="Search..."></div>
                <a href="/wiki" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">Wiki</a>
                <a href="/about" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">关于</a>
            </nav>
        </div>
    </header>

    <main style="flex:1;width:100%;max-width:720px;margin:0 auto;padding:0 24px;position:relative;box-sizing:border-box">
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><a href="/years/{{ . }}">{{ . }}</a></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Paginator.Pages }}
            <article class="post-item">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                <div class="summary-content">{{ .Summary }}</div>
                <details>
                    <summary>展开摘要 ↓</summary>
                    <div class="full-text">{{ .Summary }}<p style="margin-top:25px;"><a href="{{ .Permalink }}" style="color:#007aff;font-weight:600;text-decoration:none;">阅读全文 →</a></p></div>
                </details>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
