<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <style>
        /* 1. 全局布局重置：强制 body 居中对齐 */
        body { 
            margin: 0; 
            padding: 0; 
            background: #fff; 
            color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center; /* 核心：让内部所有元素水平居中 */
        }

        /* 2. 导航栏：使用 fixed 定位并强制内部容器居中 */
        header { 
            position: fixed; 
            top: 0; 
            left: 0; 
            right: 0; 
            height: 80px; 
            z-index: 9999; 
            background: rgba(255,255,255,0.95); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: center; /* 核心：让 nav-container 居中 */
        }
        
        .nav-container { 
            width: 100%;
            max-width: 720px; 
            height: 100%; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 0 24px; 
            box-sizing: border-box; 
        }
        
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 15px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 80px; outline: none; }
        .nav-link { font-size: 14px; opacity: 0.6; text-decoration: none; color: inherit; }

        /* 3. 内容主区域：强制 margin-left/right 为 auto */
        main { 
            width: 100%;
            max-width: 720px; 
            margin: 140px auto 0; /* auto 确保在宽屏居中 */
            padding: 0 24px; 
            position: relative; 
            box-sizing: border-box; 
        }

        /* 4. Timeline 侧边栏：仅在宽屏显示 */
        .sidebar-archive { 
            position: absolute; 
            left: calc(100% + 50px); 
            top: 0; 
            width: 100px; 
        }
        .sidebar-archive h3 { font-size: 11px; opacity: 0.2; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .sidebar-archive ul { list-style: none; padding: 0; margin: 0; font-size: 12px; opacity: 0.4; line-height: 2.5; }
        .sidebar-archive a { color: inherit; text-decoration: none; }
        
        @media (max-width: 1150px) { .sidebar-archive { display: none; } }

        /* 5. 文章样式 */
        .post-item { margin-bottom: 60px; text-align: left; }
        .post-title { font-size: 1.9rem; font-weight: 800; margin-bottom: 1rem; display: block; text-decoration: none; color: inherit; line-height: 1.3; letter-spacing: -0.02em; }
        .post-date { opacity: 0.25; font-size: 0.9rem; margin-bottom: 2rem; }
        
        /* 折叠摘要样式 */
        details { border: 1px solid rgba(0,0,0,0.05); border-radius: 10px; padding: 18px; background: rgba(0,0,0,0.02); cursor: pointer; }
        summary { font-size: 14px; font-weight: 600; color: #007aff; outline: none; list-style: none; }
        summary::-webkit-details-marker { display: none; }
        .post-summary { margin-top: 15px; line-height: 1.8; opacity: 0.8; font-size: 16px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo" onerror="this.style.display='none'">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                <div class="search-wrapper">
                    <input type="text" class="search-box" placeholder="搜索...">
                </div>
                <a href="/wiki" class="nav-link">Wiki</a>
                <a href="/about" class="nav-link">关于</a>
            </div>
        </div>
    </header>

    <main>
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><a href="/categories/{{ . }}/">{{ . }}</a></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Paginator.Pages }}
            <article class="post-item">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                <details>
                    <summary>展开摘要 ↓</summary>
                    <div class="post-summary">
                        {{ .Summary | plainify }}
                        <p style="margin-top:15px;"><a href="{{ .Permalink }}" style="color:#007aff;font-weight:700;text-decoration:none;">阅读全文 →</a></p>
                    </div>
                </details>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
