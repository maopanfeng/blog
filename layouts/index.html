<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        body { margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column; font-family:-apple-system,sans-serif; background-color: #000; color: #fff; }
        header { position:fixed; top:0; left:0; right:0; height:80px; z-index:9999; border-bottom:1px solid rgba(255,255,255,0.1); background-color:rgba(0,0,0,0.8); backdrop-filter:blur(10px); }
        .nav-container { max-width:720px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; box-sizing:border-box; }
        
        .search-wrapper { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 20px; padding: 5px 12px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 120px; outline: none; color: #fff; }

        /* Timeline 侧边栏：强制显示，但在小屏幕下调整位置避免遮挡 */
        .sidebar-archive { position:absolute; left:calc(100% + 40px); top:0; width:100px; }
        @media(max-width: 1150px) { 
            .sidebar-archive { position: static; width: 100%; margin-bottom: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
            .sidebar-archive ul { display: flex; flex-wrap: wrap; gap: 15px; }
        }

        .post-item { margin-bottom: 3rem; }
        
        /* 3句显示的逻辑：利用 line-clamp 限制显示行数 */
        .summary-preview { 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            opacity: 0.8;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        details summary { cursor: pointer; color: #007aff; font-size: 14px; outline: none; list-style: none; margin-top: 5px; }
        details[open] .summary-preview { display: none; } /* 展开后隐藏预览 */
        .full-content { line-height: 1.7; opacity: 0.9; }
        a { color: inherit; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" style="font-weight:700;font-size:1.15rem;">Ben Thinking</a>
            <nav style="display:flex;gap:20px;align-items:center">
                <div class="search-wrapper">
                    <input type="text" id="search-input" class="search-box" placeholder="搜索...">
                </div>
                <a href="/wiki" style="font-size:14px;opacity:.7">Wiki</a>
                <a href="/about" style="font-size:14px;opacity:.7">关于</a>
            </nav>
        </div>
    </header>

    <main style="flex:1;width:100%;max-width:720px;margin:120px auto 0;padding:0 24px;position:relative;box-sizing:border-box">
        <aside class="sidebar-archive">
            <h3 style="font-size:11px;opacity:.3;text-transform:uppercase;margin-bottom:16px;letter-spacing:1px">Timeline</h3>
            <ul style="list-style:none;padding:0;margin:0;font-size:13px;opacity:.4;line-height:2">
                <li>2026</li><li>2025</li><li>2024</li><li>2023</li>
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Paginator.Pages }}
            <div class="post-item">
                <h2 style="font-size:1.6rem;margin-bottom:0.5rem"><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
                <div style="opacity:.3;font-size:0.85rem;margin-bottom:1rem">{{ .Date.Format "2006-01-02" }}</div>
                
                <div class="summary-preview">{{ .Summary }}</div>
                <details>
                    <summary>展开阅读全文 ↓</summary>
                    <div class="full-content">
                        {{ .Summary }}
                        <p style="margin-top:15px;"><a href="{{ .Permalink }}" style="color:#007aff;font-weight:600;">进入文章页 →</a></p>
                    </div>
                </details>
            </div>
            {{ end }}
        </div>
    </main>
</body>
</html>
