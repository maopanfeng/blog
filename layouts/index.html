<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <style>
        body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
        .nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em; }
        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 15px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 80px; outline: none; }
        
        main { width: 100%; max-width: 720px; margin: 140px auto 0; padding: 0 24px; position: relative; box-sizing: border-box; }
        .post-item { margin-bottom: 50px; display: block; }
        .post-title { font-size: 1.85rem; font-weight: 800; margin-bottom: 0.8rem; display: block; text-decoration: none; color: inherit; line-height: 1.3; letter-spacing: -0.02em; }
        .post-title:hover { opacity: 0.7; }
        .post-date { opacity: 0.25; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .post-summary { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.8; opacity: 0.7; font-size: 16px; }

        .sidebar-archive { position: absolute; left: calc(100% + 50px); top: 0; width: 100px; }
        .sidebar-archive h3 { font-size: 11px; opacity: 0.2; text-transform: uppercase; margin-bottom: 15px; }
        .sidebar-archive ul { list-style: none; padding: 0; margin: 0; font-size: 12px; line-height: 2.2; }
        .sidebar-archive span { cursor: pointer; opacity: 0.4; transition: 0.2s; display: block; }
        .sidebar-archive span.active { opacity: 1; color: #007aff; font-weight: 600; }
        @media (max-width: 1150px) { .sidebar-archive { display: none; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo" onerror="this.style.display='none'">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                <div class="search-wrapper">
                    <form action="https://www.google.com/search" method="get" target="_blank" style="margin:0; display:flex;">
                        <input type="hidden" name="q" value="site:maopanfeng.com">
                        <input type="text" name="q" class="search-box" placeholder="搜索...">
                    </form>
                </div>
                <a href="/wiki" style="font-size:14px; opacity:0.6; text-decoration:none; color:inherit;">Wiki</a>
                <a href="/about" style="font-size:14px; opacity:0.6; text-decoration:none; color:inherit;">关于</a>
            </div>
        </div>
    </header>

    <main>
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><span onclick="filterYear('{{ . }}')" class="year-btn">{{ . }}</span></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list" id="post-container">
            {{ range where .Site.RegularPages "Title" "!=" "Wiki" }}
            <article class="post-item" data-year="{{ .Date.Format "2006" }}">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                <div class="post-summary">{{ .Summary | plainify }}</div>
            </article>
            {{ end }}
        </div>
    </main>

    <script>
        let currentYear = 'all';
        function filterYear(year) {
            const posts = document.querySelectorAll('.post-item');
            const btns = document.querySelectorAll('.year-btn');
            if (currentYear === year) { year = 'all'; }
            currentYear = year;
            btns.forEach(btn => {
                btn.classList.remove('active'); btn.style.opacity = "0.4";
                if (btn.innerText === year) { btn.classList.add('active'); btn.style.opacity = "1"; }
            });
            posts.forEach(post => {
                if (year === 'all' || post.getAttribute('data-year') === year) { post.style.display = 'block'; }
                else { post.style.display = 'none'; }
            });
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
