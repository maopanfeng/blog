<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <style>
        /* 1. 布局：全设备强制居中与白底黑字 */
        body { 
            margin: 0; padding: 0; background: #fff; color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            -webkit-font-smoothing: antialiased;
            display: flex; flex-direction: column; align-items: center; 
        }

        /* 2. 导航栏：固定高度与 720px 容器对齐 */
        header { 
            position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex; justify-content: center;
        }
        .nav-container { 
            width: 100%; max-width: 720px; height: 100%; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 24px; box-sizing: border-box; 
        }
        .logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
        .site-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
        .site-title { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.03em; }

        .nav-right { display: flex; align-items: center; gap: 20px; }
        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 15px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 80px; outline: none; }
        .nav-link { font-size: 14px; opacity: 0.6; text-decoration: none; color: inherit; }

        /* 3. 内容主区域：50px 间距 */
        main { 
            width: 100%; max-width: 720px; margin: 140px auto 0; padding: 0 24px; 
            position: relative; box-sizing: border-box; 
        }
        .post-item { 
            margin-bottom: 50px; /* 文章间距 50px */
            display: block;
        }
        .post-title { 
            font-size: 1.85rem; font-weight: 800; margin-bottom: 0.8rem; 
            display: block; text-decoration: none; color: inherit; 
            line-height: 1.3; letter-spacing: -0.02em; 
        }
        .post-date { opacity: 0.25; font-size: 0.9rem; margin-bottom: 1.5rem; }
        
        /* 4. 预览：显示 3 行后自动截断 */
        .post-summary { 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            line-height: 1.8; opacity: 0.7; font-size: 16px; 
            margin-bottom: 1.2rem;
        }
        .read-more { font-size: 14px; font-weight: 700; color: #007aff; text-decoration: none; }

        /* 5. Timeline：链接到搜索页面，实现点击年份筛选文章 */
        .sidebar-archive { position: absolute; left: calc(100% + 50px); top: 0; width: 100px; }
        .sidebar-archive h3 { font-size: 11px; opacity: 0.2; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .sidebar-archive ul { list-style: none; padding: 0; margin: 0; font-size: 12px; line-height: 2.5; }
        .sidebar-archive a { color: inherit; text-decoration: none; opacity: 0.4; transition: 0.2s; }
        .sidebar-archive a:hover { opacity: 1; color: #007aff; font-weight: 600; }
        
        @media (max-width: 1150px) { .sidebar-archive { display: none; } }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo" onerror="this.style.display='none'">
                <span class="site-title">Ben Thinking</span>
            </a>
            <div class="nav-right">
                <div class="search-wrapper">
                    <form action="/search/" method="get">
                        <input type="text" name="q" class="search-box" placeholder="搜索...">
                    </form>
                </div>
                <a href="/wiki" class="nav-link">Wiki</a>
                <a href="/about" class="nav-link">关于</a>
            </div>
        </div>
    </header>

    <main>
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><a href="/search/?q={{ . }}">{{ . }}</a></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Site.RegularPages }}
            <article class="post-item">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                <div class="post-summary">
                    {{ .Summary | plainify }}
                </div>
                <a href="{{ .Permalink }}" class="read-more">阅读全文 →</a>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
