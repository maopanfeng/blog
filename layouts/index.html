<!doctype html>

<html lang="{{ .Lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
<title>{{ .Site.Title }}</title>
<script src=""></script>
<style>
body { margin: 0; padding: 0; background: #fff; color: #000; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
header { position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; justify-content: center; }
.nav-container { width: 100%; max-width: 720px; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; }
.logo-wrapper { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
.site-logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
.site-title { font-weight: 800; font-size: 1.25rem; }
.nav-right { display: flex; align-items: center; gap: 15px; }
.search-wrapper { position: relative; display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 12px; }
.search-box { background: transparent; border: none; font-size: 13px; width: 80px; outline: none; }
#search-results { position: absolute; top: 45px; right: 0; width: 300px; background: #fff; border: 1px solid #eee; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 400px; overflow-y: auto; display: none; z-index: 10000; }
.result-item { padding: 12px 15px; border-bottom: 1px solid #f9f9f9; display: block; text-decoration: none; color: inherit; font-size: 14px; text-align: left; }
.lang-switch { font-size: 12px; opacity: 0.4; text-decoration: none; color: inherit; font-weight: 700; border: 1px solid #ddd; padding: 2px 6px; border-radius: 4px; }
main { width: 100%; max-width: 720px; margin: 140px auto 0; padding: 0 24px; box-sizing: border-box; flex: 1; }
.post-item { margin-bottom: 60px; display: block; }
.post-title { font-size: 1.85rem; font-weight: 800; text-decoration: none; color: inherit; line-height: 1.3; }
footer { width: 100%; padding: 100px 24px 60px; text-align: center; font-size: 12px; opacity: 0.2; }
</style>
</head>
<body>
<header>
<div class="nav-container">
<a href="{{ .Site.BaseURL | relLangURL }}" class="logo-wrapper">
<img src="/logo.png" alt="" class="site-logo">
<span class="site-title">Ben Thinking</span>
</a>
<div class="nav-right">
<div class="search-wrapper">
<input type="text" id="search-input" class="search-box" placeholder="{{ if eq .Lang "cn" }}搜索...{{ else }}Search...{{ end }}">
<div id="search-results"></div>
</div>
{{ if eq .Lang "en" }} <a href="/cn/" class="lang-switch">中文</a>
{{ else }} <a href="/" class="lang-switch">EN</a> {{ end }}
<a href="{{ "wiki" | relLangURL }}" style="font-size:14px; opacity:0.6; text-decoration:none; color:inherit;">Wiki</a>
</div>
</div>
</header>
<main>
<div class="post-list">
{{ range .Site.RegularPages }}
{{ if and (ne .Title "Wiki") (ne .Title "") }}
<article class="post-item">
<a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
<div style="opacity:0.25; font-size:0.9rem; margin: 10px 0;">{{ .Date.Format "2006-01-02" }}</div>
<div style="line-height:1.8; opacity:0.7; font-size:16px;">{{ .Summary | plainify | truncate 150 }}</div>
</article>
{{ end }}
{{ end }}
</div>
</main>
<footer><p>© 2026 Ben Thinking. All Rights Reserved.</p></footer>
<script>
let fuse;
fetch('{{ "index.json" | relLangURL }}').then(res => res.json()).then(data => {
fuse = new Fuse(data, { keys: ['title', 'content'], threshold: 0.4 });
});
const input = document.getElementById('search-input');
const results = document.getElementById('search-results');
input.addEventListener('input', (e) => {
const query = e.target.value;
if (!query) { results.style.display = 'none'; return; }
const list = fuse.search(query);
if (list.length > 0) {
results.innerHTML = list.slice(0, 6).map(res => &lt;a href=&quot;${res.item.permalink}&quot; class=&quot;result-item&quot;&gt;&lt;strong&gt;${res.item.title}&lt;/strong&gt;&lt;/a&gt;).join('');
results.style.display = 'block';
} else { results.style.display = 'none'; }
});
</script>
</body>
</html>
