<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        /* 基础对齐：白底黑字 */
        body { margin:0; padding:0; min-height:100vh; background-color:#fff; color:#000; font-family:-apple-system,BlinkMacSystemFont,sans-serif; -webkit-font-smoothing:antialiased; }
        
        /* 导航栏固定：锁定 720px 容器 */
        header { position:fixed; top:0; left:0; right:0; height:80px; z-index:9999; background-color:rgba(255,255,255,0.95); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border-bottom:1px solid rgba(0,0,0,0.05); }
        .nav-container { max-width:720px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; box-sizing:border-box; }
        
        /* Logo 与标题对齐 */
        .logo-wrapper { display:flex; align-items:center; gap:12px; text-decoration:none; color:inherit; }
        .site-logo { width:32px; height:32px; object-fit:contain; border-radius:6px; }
        .site-title { font-weight:800; font-size:1.25rem; letter-spacing:-0.03em; }

        .nav-links { display:flex; gap:25px; align-items:center; }
        .search-wrapper { display:flex; align-items:center; background:rgba(0,0,0,0.05); border-radius:20px; padding:5px 12px; }
        .search-box { background:transparent; border:none; font-size:13px; width:100px; outline:none; color:#000; }

        /* 内容区：强制对齐 Logo */
        main { display:block; max-width:720px; margin:0 auto; padding:140px 24px 0; position:relative; box-sizing:border-box; }
        
        /* Timeline 侧边栏 */
        .sidebar-archive { position:absolute; left:calc(100% + 50px); top:0; width:100px; }
        .sidebar-archive h3 { font-size:11px; opacity:0.2; text-transform:uppercase; margin-bottom:12px; letter-spacing:1.5px; }
        .sidebar-archive ul { list-style:none; padding:0; margin:0; font-size:12px; opacity:0.4; line-height:2.4; }
        .sidebar-archive a { color:inherit; text-decoration:none; }
        @media(max-width:1200px) { .sidebar-archive { display:none; } }

        /* 文章列表：50px 间距 */
        .post-item { margin-bottom:50px; display:block; }
        .post-title { font-size:1.75rem; font-weight:700; margin-bottom:0.8rem; display:block; text-decoration:none; color:inherit; letter-spacing:-0.02em; line-height:1.2; }
        .post-date { opacity:0.25; font-size:0.85rem; margin-bottom:1.5rem; }
        
        /* 3句摘要 */
        .summary-content { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; opacity:0.7; line-height:1.8; font-size:15px; margin-bottom:1rem; }
        .read-more { font-size:13px; font-weight:600; color:#007aff; text-decoration:none; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="logo-wrapper">
                <img src="/logo.png" alt="" class="site-logo" onerror="this.style.display='none'">
                <span class="site-title">Ben Thinking</span>
            </a>
            <nav class="nav-links">
                <div class="search-wrapper"><input type="text" class="search-box" placeholder="Search..."></div>
                <a href="/wiki" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">Wiki</a>
                <a href="/about" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">关于</a>
            </nav>
        </div>
    </header>

    <main>
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><a href="/{{ . }}/">{{ . }}</a></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Site.RegularPages }}
            <article class="post-item">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                <div class="summary-content">{{ .Summary | plainify }}</div>
                <a href="{{ .Permalink }}" class="read-more">阅读全文 →</a>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
