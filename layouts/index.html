<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>Ben Thinking</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        /* 1. 基础样式：纯白背景，纯黑文字，对齐 About */
        body { margin:0; padding:0; min-height:100vh; display:flex; flex-direction:column; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background-color: #fff; color: #000; -webkit-font-smoothing: antialiased; }
        
        /* 2. 导航栏：锁定 720px 宽度，解决 Logo 飘走问题 */
        header { position:fixed; top:0; left:0; right:0; height:90px; z-index:9999; border-bottom:1px solid rgba(0,0,0,0.06); background-color:rgba(255,255,255,0.9); backdrop-filter:blur(10px); }
        .nav-container { max-width:720px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; box-sizing:border-box; }
        .site-title { font-weight:700; font-size:1.2rem; text-decoration:none; color:inherit; letter-spacing:-0.02em; }

        .search-wrapper { display: flex; align-items: center; background: rgba(0,0,0,0.05); border-radius: 20px; padding: 6px 15px; }
        .search-box { background: transparent; border: none; font-size: 13px; width: 100px; outline: none; color: #000; }

        /* 3. Timeline：补全到 2000 年，锁定在右侧 */
        .sidebar-archive { position:absolute; left:calc(100% + 50px); top:0; width:100px; }
        .sidebar-archive h3 { font-size:11px; opacity:0.3; text-transform:uppercase; margin-bottom:16px; letter-spacing:1.5px; }
        .sidebar-archive ul { list-style:none; padding:0; margin:0; font-size:12px; opacity:0.4; line-height:2.4; }
        .sidebar-archive a { color: inherit; text-decoration: none; }
        @media(max-width: 1200px) { .sidebar-archive { display: none; } }

        /* 4. 文章列表：增加 6rem 的间距，拉开呼吸感 */
        .post-list { margin-top: 140px; }
        .post-item { margin-bottom: 7rem; } 
        .post-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; display: block; text-decoration:none; color:inherit; }
        .post-date { opacity: 0.3; font-size: 0.9rem; margin-bottom: 2rem; }
        
        /* 5. 摘要折叠：精准 3 行截断 */
        .summary-content { 
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
            opacity: 0.7;
            line-height: 1.8;
            font-size: 16px;
        }

        details { margin-top: 15px; }
        summary { cursor: pointer; color: #007aff; font-size: 14px; outline: none; list-style: none; padding: 8px 0; font-weight: 500; }
        details[open] .summary-content { display: none; } 
        .full-text { line-height: 1.9; opacity: 0.85; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="/" class="site-title">Ben Thinking</a>
            <nav style="display:flex;gap:25px;align-items:center">
                <div class="search-wrapper"><input type="text" class="search-box" placeholder="Search..."></div>
                <a href="/wiki" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">Wiki</a>
                <a href="/about" style="font-size:14px;opacity:0.6;text-decoration:none;color:inherit;">关于</a>
            </nav>
        </div>
    </header>

    <main style="flex:1;width:100%;max-width:720px;margin:0 auto;padding:0 24px;position:relative;box-sizing:border-box">
        <aside class="sidebar-archive">
            <h3>Timeline</h3>
            <ul>
                {{ range (seq 2026 -1 2000) }}
                <li><a href="/archive/{{ . }}">{{ . }}</a></li>
                {{ end }}
            </ul>
        </aside>

        <div class="post-list">
            {{ range .Paginator.Pages }}
            <article class="post-item">
                <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
                <div class="post-date">{{ .Date.Format "2006-01-02" }}</div>
                
                <div class="summary-content">{{ .Summary }}</div>
                
                <details>
                    <summary>展开摘要 ↓</summary>
                    <div class="full-text">
                        {{ .Summary }}
                        <p style="margin-top:20px;"><a href="{{ .Permalink }}" style="color:#007aff;font-weight:600;text-decoration:none;">阅读全文 →</a></p>
                    </div>
                </details>
            </article>
            {{ end }}
        </div>
    </main>
</body>
</html>
