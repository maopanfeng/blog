baseURL = "https://maopanfeng.com/"
title = "Ben Thinking"
theme = "你的主题名" # 保持不变

# 开启 JSON 输出用于全站原生搜索
[outputs]
  home = ["HTML", "JSON"]

# 默认语言设置
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false # 英文在根目录 /，中文在 /cn/

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    contentDir = "content/en" # 英文文章放这里

  [languages.cn]
    languageName = "中文"
    weight = 2
    contentDir = "content/cn" # 中文文章放这里
    languageCode = "zh-cn"
