baseURL = ""
title = "Ben Thinking"

1. 核心语言设置
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

2. 主题配置 (如果你没有 themes 文件夹，请保持下面这行前面有 # 号)
theme = "oswaldo"
3. 搜索索引输出配置
[outputs]
home = ["HTML", "JSON"]

4. 多语言详细定义
[languages]
[languages.en]
languageName = "English"
contentDir = "content/en"
weight = 1

[languages.cn]
languageName = "中文"
contentDir = "content/cn"
weight = 2
languageCode = "zh-cn"
