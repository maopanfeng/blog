baseURL = 'https://maopanfeng.com/'
languageCode = 'zh-cn'
title = 'Ben Blog'
theme = 'paper'

[params]
    name = "Ben"
    description = "Complexity Investing"
    # 开启搜索功能所需的参数 (根据 Paper 主题通常要求)
    search = true 
    # 如果你的 Wiki 有专门的样式，可以在这里定义
    wiki = true

[menu]
  [[menu.main]]
    name = "首页"
    url = "/"
    weight = 10
  [[menu.main]]
    name = "Wiki"
    url = "/wiki"
    weight = 20
  [[menu.main]]
    name = "搜索"
    url = "/search"
    weight = 30
  [[menu.main]]
    name = "关于"
    url = "/about"
    weight = 40

# 确保搜索功能能生成索引文件
[outputs]
  home = ["HTML", "RSS", "JSON"]
